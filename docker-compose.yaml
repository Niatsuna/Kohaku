services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - kohaku-database:/var/lib/postgresql/data

  kohaku-backend:
    build: backend/
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SERVER_ADDR=${SERVER_ADDR}
      - SERVER_PORT=${SERVER_PORT}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"

  kohaku-discord:
    build: discord/
    restart: unless-stopped
    depends_on:
      - kohaku-backend
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - BOT_PORT=${BOT_PORT}
    ports:
      - "${BOT_PORT}:${BOT_PORT}"
volumes:
  kohaku-database: